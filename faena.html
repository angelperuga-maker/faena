<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Faena — Mecánicos pesados on-demand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  @keyframes scrIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulseRing{0%{transform:scale(.7);opacity:.55;}80%,100%{transform:scale(2.1);opacity:0;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes blip{0%,100%{opacity:1;}50%{opacity:.35;}}
  .scr{animation:scrIn .32s cubic-bezier(.22,.61,.36,1);}
  .sc-y{overflow-y:auto;scrollbar-width:none;}
  .sc-y::-webkit-scrollbar{display:none;}
  .tap{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform .12s,filter .15s,background .15s,border-color .15s;}
  .tap:active{transform:scale(.97);filter:brightness(.97);}

  .app{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
       background:radial-gradient(120% 90% at 50% 0%,#EEF2F7 0%,#DCE3EC 100%);padding:40px;
       font-family:'IBM Plex Sans',system-ui,sans-serif;}
  .phone{width:402px;height:874px;border-radius:46px;background:#0F1B2D;padding:11px;
         box-shadow:0 50px 90px -20px rgba(15,27,45,.45),0 0 0 1px rgba(15,27,45,.18);position:relative;}
  .host{position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:#F4F6F9;
        display:flex;flex-direction:column;}
  @media (max-width:480px){
    .app{padding:0;}
    .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;}
    .host{border-radius:0;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="phone">
    <div class="host">

      <!-- status bar (presentation frame) -->
      <div style="position:absolute;top:0;left:0;right:0;z-index:40;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;pointer-events:none;color:#0F1B2D;">
        <span style="font-size:15px;font-weight:600;letter-spacing:.3px;font-variant-numeric:tabular-nums;">9:41</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="18" height="11" viewBox="0 0 18 11" fill="none"><rect x="0" y="7" width="3" height="4" rx=".6" fill="currentColor"/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill="currentColor"/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill="currentColor"/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill="currentColor"/></svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="3" stroke="currentColor" stroke-opacity=".4" fill="none"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.5" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
        </div>
      </div>
      <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:32px;border-radius:18px;background:#0F1B2D;z-index:45;"></div>

      <!-- screen stack -->
      <div id="stack" class="sc-y" style="flex:1;position:relative;display:flex;flex-direction:column;"></div>

      <!-- bottom tab bar -->
      <div id="tabbar"></div>

    </div>
  </div>
</div>

<script>
"use strict";
/* ===========================================================================
   Faena — recreation of the DC prototype as a runnable vanilla-JS state machine.
   The proprietary <x-dc> runtime is replaced; markup, tokens and logic mirror
   the original handoff (README.md) screen-for-screen.
   =========================================================================== */

const state = {
  screen: 'home',
  sosFault: 'frenos',
  sosSeverity: 'critica',
  selMech: 0,
  matchDone: false,
  eta: 8 * 60,
  paid: false,
  available: true,
};

let _mt = null;   // match-search timeout
let _et = null;   // eta countdown interval
let lastScreen = null;

const clp = (n) => '$' + n.toLocaleString('es-CL');

/* ---------------------------- static data ------------------------------- */
const fleetRaw = [
  { name: 'Excavadora CAT 336', code: 'EXC-336', type: 'Excavadora', status: 'Detenida', kind: 'down' },
  { name: 'Camión Volvo A40G', code: 'CAM-A40', type: 'Camión articulado', status: 'Operativo', kind: 'ok' },
  { name: 'Bulldozer Komatsu D65', code: 'BUL-D65', type: 'Bulldozer', status: 'Operativo', kind: 'ok' },
];

const tabDefs = [
  { id: 'home', label: 'Inicio', icon: 'home' },
  { id: 'servicios', label: 'Servicios', icon: 'serv' },
  { id: 'perfil', label: 'Perfil', icon: 'user' },
];

const faultDefs = [
  { id: 'frenos', label: 'Frenos de aire' },
  { id: 'hidraulico', label: 'Sistema hidráulico' },
  { id: 'electronica', label: 'Falla electrónica' },
  { id: 'motor', label: 'Motor diésel' },
  { id: 'transmision', label: 'Transmisión' },
  { id: 'rodaje', label: 'Tren de rodaje' },
];

const sevDefs = [
  { id: 'critica', label: 'Crítica', sub: 'Equipo detenido', ink: '#C1331C', bg: '#FDECE8' },
  { id: 'alta', label: 'Alta', sub: 'Operación limitada', ink: '#E08600', bg: '#FCF2DF' },
  { id: 'media', label: 'Media', sub: 'Puede esperar', ink: '#15976A', bg: '#E6F4EE' },
];

const mechRaw = [
  { name: 'Rodrigo Salazar', spec: 'Frenos de aire · Hidráulica', rating: 4.9, jobs: 212, etaMin: 8, distKm: 3.4, priceFrom: 45000, certs: ['CAT Certificado', 'SENCE', 'Frenos ABS'], match: 97, init: 'RS', avatarBg: '#1A56C4', top: true },
  { name: 'Marcela Tapia', spec: 'Electrónica · Diagnóstico', rating: 4.8, jobs: 156, etaMin: 14, distKm: 6.1, priceFrom: 42000, certs: ['Volvo Cert.', 'Bosch ESI'], match: 88, init: 'MT', avatarBg: '#15976A', top: false },
  { name: 'Iván Quezada', spec: 'Motor diésel · Transmisión', rating: 4.7, jobs: 98, etaMin: 22, distKm: 9.8, priceFrom: 38000, certs: ['Komatsu', 'Inyección diésel'], match: 74, init: 'IQ', avatarBg: '#E08600', top: false },
];

const reviews = [
  { name: 'Jorge M.', org: 'Minera Norte', stars: '★★★★★', time: 'hace 2 sem', text: 'Llegó en 25 min a plena ruta y dejó la excavadora operativa el mismo día. Trae todo: prensa hidráulica, scanner y repuestos comunes.' },
  { name: 'Carla R.', org: 'Constructora Sur', stars: '★★★★★', time: 'hace 1 mes', text: 'Diagnóstico exacto del sistema de frenos de aire. Muy claro con el presupuesto, sin sorpresas al final.' },
  { name: 'Esteban V.', org: 'Áridos El Roble', stars: '★★★★★', time: 'hace 1 mes', text: 'Disponible un domingo. Resolvió una fuga hidráulica que otros no encontraban. Recomendado 100%.' },
];

const quoteRaw = [
  { label: 'Visita y diagnóstico en terreno', val: 45000 },
  { label: 'Mano de obra (2.5 h)', val: 62500 },
  { label: 'Sello hidráulico — cilindro brazo', val: 38000 },
  { label: 'Purga sistema de frenos de aire', val: 18000 },
];
const subtotal = quoteRaw.reduce((a, b) => a + b.val, 0);
const fee = Math.round(subtotal * 0.1);
const total = subtotal + fee;

/* ---------------------------- shared SVG -------------------------------- */
const ICON = {
  excavator: (ink) => `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 17h13v-3l4-1-1-4h-5l-2-4H7v8H3v4z" stroke="${ink}" stroke-width="1.6" stroke-linejoin="round"/><circle cx="7" cy="18.5" r="2" stroke="${ink}" stroke-width="1.6"/><circle cx="16" cy="18.5" r="2" stroke="${ink}" stroke-width="1.6"/></svg>`,
  chevL: (c) => `<svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M8 1L1 8l7 7" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  chevR: (c) => `<svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  arrow: (c, w = 18) => `<svg width="${w}" height="${w}" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M10 4l5 5-5 5" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  check: (c, w = 12, sw = 2) => `<svg width="${w}" height="${w}" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  checkBig: (c) => `<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 6" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  wrench: (c, w = 34) => `<svg width="${w}" height="${w}" viewBox="0 0 24 24" fill="none"><path d="M14.7 6.3a5 5 0 00-6.4 6.4L3 18v3h3l5.3-5.3a5 5 0 006.4-6.4l-2.8 2.8-2.3-2.3 2.8-2.8z" stroke="${c}" stroke-width="1.7" stroke-linejoin="round"/></svg>`,
  pin: (c) => `<svg width="30" height="38" viewBox="0 0 30 38" fill="none"><path d="M15 0C7 0 1 6 1 14c0 9 14 24 14 24s14-15 14-24C29 6 23 0 15 0z" fill="${c}"/><circle cx="15" cy="14" r="5.5" fill="#fff"/></svg>`,
};

/* ----------------------------- screens ---------------------------------- */
function screenHome() {
  const fleet = fleetRaw.map((e) => {
    const down = e.kind === 'down';
    const iconBg = down ? '#FDECE8' : '#EEF2F7', iconInk = down ? '#C1331C' : '#5C6B80';
    const statusBg = down ? '#FDECE8' : '#E6F4EE', statusInk = down ? '#C1331C' : '#15976A';
    return `
      <div data-act="goSOS" class="tap" style="background:#fff;border:1px solid #E6EBF2;border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:13px;">
        <div style="width:44px;height:44px;border-radius:12px;background:${iconBg};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${ICON.excavator(iconInk)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:600;color:#0F1B2D;">${e.name}</div>
          <div style="font-family:'IBM Plex Mono';font-size:11px;color:#94A3B5;letter-spacing:.5px;margin-top:1px;">${e.code} · ${e.type}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;background:${statusBg};color:${statusInk};border-radius:8px;padding:5px 9px;font-size:11.5px;font-weight:600;">
          <span style="width:6px;height:6px;border-radius:50%;background:${statusInk};"></span>${e.status}
        </div>
      </div>`;
  }).join('');

  return `<div style="padding:62px 0 26px;">
    <div style="padding:0 22px 18px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:1.5px;color:#1A56C4;text-transform:uppercase;">Constructora Andes Ltda.</div>
        <div style="font-size:25px;font-weight:700;color:#0F1B2D;letter-spacing:-.4px;margin-top:3px;">Hola, Patricio</div>
      </div>
      <div data-act="goPerfil" class="tap" style="width:46px;height:46px;border-radius:14px;background:#0F1B2D;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;">PV</div>
    </div>

    <div style="margin:0 18px 16px;border-radius:20px;background:linear-gradient(150deg,#E5482E 0%,#C1331C 100%);padding:18px 18px 16px;color:#fff;box-shadow:0 16px 30px -12px rgba(193,51,28,.55);position:relative;overflow:hidden;">
      <div style="position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);"></div>
      <div style="display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.92;">
        <span style="width:7px;height:7px;border-radius:50%;background:#fff;animation:blip 1.1s infinite;"></span>Equipo detenido · cada hora cuesta
      </div>
      <div style="font-size:19px;font-weight:700;margin-top:8px;letter-spacing:-.2px;">Excavadora CAT 336 sin frenos</div>
      <div style="font-size:13px;opacity:.9;margin-top:2px;">Obra Ruta 68 km 24 · detenida hace 18 min</div>
      <div data-act="goSOS" class="tap" style="margin-top:14px;background:#fff;color:#C1331C;border-radius:13px;height:50px;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:16px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 13.5H11L10 22l8.5-11.5H12L13 2z" fill="#C1331C"/></svg>
        Pedir asistencia express
      </div>
    </div>

    <div style="display:flex;gap:10px;padding:0 18px;margin-bottom:18px;">
      <div style="flex:1;background:#fff;border:1px solid #E6EBF2;border-radius:16px;padding:13px 14px;">
        <div style="font-family:'IBM Plex Mono';font-size:22px;font-weight:600;color:#15976A;">14</div>
        <div style="font-size:11.5px;color:#5C6B80;margin-top:1px;line-height:1.25;">mecánicos cerca</div>
      </div>
      <div style="flex:1;background:#fff;border:1px solid #E6EBF2;border-radius:16px;padding:13px 14px;">
        <div style="font-family:'IBM Plex Mono';font-size:22px;font-weight:600;color:#0F1B2D;">~8<span style="font-size:13px;color:#5C6B80;"> min</span></div>
        <div style="font-size:11.5px;color:#5C6B80;margin-top:1px;line-height:1.25;">ETA más cercano</div>
      </div>
      <div style="flex:1;background:#fff;border:1px solid #E6EBF2;border-radius:16px;padding:13px 14px;">
        <div style="font-family:'IBM Plex Mono';font-size:22px;font-weight:600;color:#0F1B2D;">3</div>
        <div style="font-size:11.5px;color:#5C6B80;margin-top:1px;line-height:1.25;">equipos en flota</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 22px 10px;">
      <div style="font-size:15px;font-weight:700;color:#0F1B2D;">Mi flota</div>
      <div style="font-size:13px;color:#1A56C4;font-weight:600;">Ver todo</div>
    </div>
    <div style="padding:0 18px;display:flex;flex-direction:column;gap:10px;">${fleet}</div>
  </div>`;
}

function screenSOS() {
  const faults = faultDefs.map((f) => {
    const a = state.sosFault === f.id;
    const bg = a ? '#1A56C4' : '#fff', border = a ? '#1A56C4' : '#E6EBF2', ink = a ? '#fff' : '#33415C';
    return `<div data-act="selFault" data-arg="${f.id}" class="tap" style="background:${bg};border:1.5px solid ${border};color:${ink};border-radius:13px;padding:13px 12px;font-size:13.5px;font-weight:600;text-align:center;">${f.label}</div>`;
  }).join('');

  const sev = sevDefs.map((v) => {
    const a = state.sosSeverity === v.id;
    const bg = a ? v.bg : '#fff', border = a ? v.ink : '#E6EBF2', labelInk = a ? v.ink : '#0F1B2D';
    return `
      <div data-act="selSev" data-arg="${v.id}" class="tap" style="background:${bg};border:1.5px solid ${border};border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;">
        <span style="width:11px;height:11px;border-radius:50%;background:${v.ink};flex-shrink:0;"></span>
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:600;color:${labelInk};">${v.label}</div>
          <div style="font-size:12.5px;color:#5C6B80;margin-top:1px;">${v.sub}</div>
        </div>
        <div style="display:${a ? 'flex' : 'none'};width:22px;height:22px;border-radius:50%;background:${v.ink};align-items:center;justify-content:center;">${ICON.check('#fff')}</div>
      </div>`;
  }).join('');

  return `<div style="padding:58px 0 0;display:flex;flex-direction:column;min-height:100%;">
    <div style="display:flex;align-items:center;gap:12px;padding:0 18px 14px;">
      <div data-act="backFromSOS" class="tap" style="width:38px;height:38px;border-radius:12px;background:#fff;border:1px solid #E6EBF2;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${ICON.chevL('#0F1B2D')}</div>
      <div>
        <div style="font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:1px;color:#C1331C;text-transform:uppercase;">Asistencia express</div>
        <div style="font-size:21px;font-weight:700;color:#0F1B2D;letter-spacing:-.3px;">Solicitar mecánico</div>
      </div>
    </div>

    <div style="padding:0 18px 110px;display:flex;flex-direction:column;gap:22px;">
      <div>
        <div style="font-size:13px;font-weight:600;color:#5C6B80;margin-bottom:9px;">Equipo afectado</div>
        <div style="background:#fff;border:1px solid #E6EBF2;border-radius:16px;padding:14px;display:flex;align-items:center;gap:13px;">
          <div style="width:46px;height:46px;border-radius:12px;background:#FDECE8;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${ICON.excavator('#C1331C')}</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;color:#0F1B2D;">Excavadora CAT 336</div>
            <div style="font-family:'IBM Plex Mono';font-size:11px;color:#94A3B5;letter-spacing:.5px;margin-top:1px;">EXC-336 · 2021 · 4.200 h</div>
          </div>
          <div style="font-size:13px;color:#1A56C4;font-weight:600;">Cambiar</div>
        </div>
      </div>

      <div>
        <div style="font-size:13px;font-weight:600;color:#5C6B80;margin-bottom:9px;">¿Qué está fallando?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">${faults}</div>
      </div>

      <div>
        <div style="font-size:13px;font-weight:600;color:#5C6B80;margin-bottom:9px;">Gravedad</div>
        <div style="display:flex;flex-direction:column;gap:9px;">${sev}</div>
      </div>

      <div>
        <div style="font-size:13px;font-weight:600;color:#5C6B80;margin-bottom:9px;">Ubicación del equipo</div>
        <div style="border:1px solid #E6EBF2;border-radius:16px;overflow:hidden;background:#fff;">
          <div style="height:120px;background:repeating-linear-gradient(45deg,#EAF0F7,#EAF0F7 11px,#E1E9F2 11px,#E1E9F2 22px);position:relative;">
            <div style="position:absolute;inset:0;background:radial-gradient(closest-side,rgba(26,86,196,.18),transparent);"></div>
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);">${ICON.pin('#1A56C4')}</div>
          </div>
          <div style="padding:13px 15px;display:flex;align-items:center;gap:10px;">
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:600;color:#0F1B2D;">Obra Ruta 68, km 24</div>
              <div style="font-size:12px;color:#94A3B5;margin-top:1px;">GPS detectado · Curacaví, RM</div>
            </div>
            <span style="background:#E6F4EE;color:#15976A;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono';">GPS OK</span>
          </div>
        </div>
      </div>
    </div>

    <div style="position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,246,249,0) 0%,#F4F6F9 28%);padding:14px 18px 22px;margin-top:auto;">
      <div data-act="searchMechanics" class="tap" style="height:54px;border-radius:15px;background:#1A56C4;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px;font-weight:700;box-shadow:0 14px 26px -10px rgba(26,86,196,.6);">
        Buscar mecánico certificado ${ICON.arrow('#fff')}
      </div>
    </div>
  </div>`;
}

function screenMatching() {
  if (!state.matchDone) {
    return `<div style="min-height:100%;display:flex;flex-direction:column;">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center;">
        <div style="position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:30px;">
          <span style="position:absolute;width:120px;height:120px;border-radius:50%;background:#1A56C4;animation:pulseRing 1.8s ease-out infinite;"></span>
          <span style="position:absolute;width:120px;height:120px;border-radius:50%;background:#1A56C4;animation:pulseRing 1.8s ease-out infinite .9s;"></span>
          <div style="width:70px;height:70px;border-radius:50%;background:#1A56C4;display:flex;align-items:center;justify-content:center;z-index:1;box-shadow:0 12px 24px -8px rgba(26,86,196,.6);">${ICON.wrench('#fff')}</div>
        </div>
        <div style="font-size:19px;font-weight:700;color:#0F1B2D;">Buscando mecánicos</div>
        <div style="font-size:14px;color:#5C6B80;margin-top:6px;line-height:1.5;">Filtrando por especialidad en <b style="color:#0F1B2D;">frenos de aire</b> y disponibilidad en tu zona…</div>
        <div style="font-family:'IBM Plex Mono';font-size:12px;color:#1A56C4;margin-top:20px;display:flex;align-items:center;gap:8px;">
          <span style="width:14px;height:14px;border:2px solid #C9D8EF;border-top-color:#1A56C4;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;"></span>
          14 mecánicos certificados cerca
        </div>
      </div>
    </div>`;
  }

  const cards = mechRaw.map((m, i) => {

function trackStepsHTML() {
  const steps = [

  const ownerScreens = ['home', 'servicios', 'perfil'];

  if (!ownerScreens.includes(state.screen)) { host.innerHTML = ''; return; }
  const items = tabDefs.map((t) => {
    const color = state.screen === t.id ? '#1A56C4' : '#94A3B5';
    return `<div data-act="goTab" data-arg="${t.id}" class="tap" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 14px;color:${color};">
      <div style="width:24px;height:24px;">${tabIcon(t.icon, color)}</div>

    </div>`;
  }).join('');
  host.innerHTML = `<div style="flex-shrink:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid #E6EBF2;padding:9px 16px 26px;display:flex;justify-content:space-around;z-index:30;">${items}</div>`;
}

/* ------------------------------ router ---------------------------------- */
const SCREENS = {
  home: screenHome, sos: screenSOS, matching: screenMatching, profile: screenProfile,
  tracking: screenTracking, quote: screenQuote, confirm: screenConfirm,
  servicios: screenServicios, perfil: screenPerfil, mechHome: screenMechHome, mechReq: screenMechReq,
};

function render() {
  const stack = document.getElementById('stack');
  const animate = state.screen !== lastScreen;
  const inner = SCREENS[state.screen]();
  stack.innerHTML = `<div class="${animate ? 'scr' : ''}">${inner}</div>`;
  if (animate) stack.scrollTop = 0;
  renderTabBar();
  lastScreen = state.screen;
}

function set(patch) { Object.assign(state, patch); render(); }

function go(screen) {
  clearTimeout(_mt); _mt = null;
  clearInterval(_et); _et = null;
  state.screen = screen;
  render();
}

function updateTracking() {
  const c = document.getElementById('etaClock');
  const b = document.getElementById('trackBar');
  if (!c || !b) return;
  const mm = Math.floor(state.eta / 60), ss = String(state.eta % 60).padStart(2, '0');
  c.textContent = mm + ':' + ss;
  b.style.width = Math.round((1 - state.eta / 480) * 100) + '%';
}

/* ----------------------------- handlers --------------------------------- */
const H = {
  goPerfil: () => go('perfil'),
  goSOS: () => go('sos'),
  goHome: () => go('home'),
  goQuote: () => go('quote'),
  backFromSOS: () => go('home'),
  backToMatching: () => go('matching'),
  toMechSide: () => go('mechHome'),
  toOwnerSide: () => go('home'),
  openMechReq: () => go('mechReq'),
  backMechHome: () => go('mechHome'),
  acceptMechReq: () => go('mechHome'),
  goTab: (id) => go(id),
  selFault: (id) => set({ sosFault: id }),
  selSev: (id) => set({ sosSeverity: id }),
  selMech: (i) => { state.selMech = +i; go('profile'); },
  payNow: () => { state.paid = true; go('confirm'); },
  toggleAvail: () => set({ available: !state.available }),
  searchMechanics: () => {
    state.matchDone = false;
    go('matching');
    _mt = setTimeout(() => { state.matchDone = true; render(); }, 2000);
  },
  requestService: () => {
    state.eta = 8 * 60;
    go('tracking');
    _et = setInterval(() => {
      state.eta = Math.max(0, state.eta - 9);
      if (state.eta === 0) { clearInterval(_et); _et = null; render(); }
      else updateTracking();
    }, 1000);
  },
};

document.querySelector('.app').addEventListener('click', (ev) => {
  const el = ev.target.closest('[data-act]');
  if (!el) return;
  const fn = H[el.getAttribute('data-act')];
  if (fn) fn(el.getAttribute('data-arg'));
});

/* optional demo entry: ?side=mech starts on the mechanic dashboard */
if (new URLSearchParams(location.search).get('side') === 'mech') state.screen = 'mechHome';

render();
</script>
</body>
</html>
