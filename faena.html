    .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;}

const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
const initialsOf = (name) => (name.trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join('') || 'TC').toUpperCase();

// approved techs become bookable mechanics, appended to the base roster
function buildMechanics() {
  const approvedAsMech = state.approvedTechs.map((t, i) => ({
    name: t.name, spec: (t.specs || []).join(' · '),
    rating: t.rating != null ? t.rating : 5.0,
    jobs: t.jobs != null ? t.jobs : 0,
    etaMin: 12 + i * 3, distKm: 4.5 + i, priceFrom: t.tarifa,
    certs: String(t.certs || '').split(/,\s*/).filter(Boolean).slice(0, 3),
    match: 90, init: t.init, avatarBg: t.color || techAvatars[i % techAvatars.length],
    top: false, isNew: !(t.jobs > 0),
  }));
  return [...mechRaw, ...approvedAsMech];
}

/* --------------------- Supabase supply-side data layer ------------------ */
function mapTechRow(r) {
  return {
    id: r.id, name: r.nombre, rut: r.rut || '—',
    specs: r.especialidades && r.especialidades.length ? r.especialidades : (r.especialidad ? [r.especialidad] : []),
    zona: r.zona, tarifa: r.tarifa || 25000, certs: r.certs || r.especialidad || '—',
    herr: r.herramientas || '', init: r.iniciales || initialsOf(r.nombre || 'TC'),
    when: '—', rating: r.rating != null ? Number(r.rating) : null, jobs: r.jobs, color: r.color,
  };
}

async function loadFaena() {
  try {
    const [mec, par] = await Promise.all([
      sb.from('mecanicos').select('*').order('created_at', { ascending: false }),
      sb.from('parametros').select('*').eq('id', 1).maybeSingle(),
    ]);
    if (mec.data) {
      const baseNames = mechRaw.map((m) => m.name);
      state.pendingTechs = mec.data.filter((r) => !r.verificado && r.estado !== 'suspendido').map(mapTechRow);
      state.approvedTechs = mec.data
        .filter((r) => r.verificado && r.estado === 'activo' && !baseNames.includes(r.nombre))
        .map(mapTechRow);
    }
    if (par && par.data) {
      const p = par.data;
      state.params = { comision: p.comision, tarifaVisita: p.tarifa_visita, tarifaHora: p.tarifa_hora, radioKm: p.radio_km };
    }
  } catch (e) { console.error('Faena load error:', e); }
}

function trackStepsHTML() {
  const steps = [

  return steps.map((t) => {

    const dotBorder = t.st === 'todo' ? '#D2DBE6' : 'transparent';

          <div style="width:20px;height:20px;border-radius:50%;background:${dotBg};border:2px solid ${dotBorder};display:flex;align-items:center;justify-content:center;position:relative;">

        <div style="flex:1;padding-bottom:14px;display:flex;justify-content:space-between;">

  }).join('');
}

  if (icon === 'serv') return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="14" rx="2.5" stroke="${color}" stroke-width="1.7"/><path d="M3.5 9.5h17M8 3v4M16 3v4" stroke="${color}" stroke-width="1.7" stroke-linecap="round"/></svg>`;
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="${color}" stroke-width="1.7"/><path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5" stroke="${color}" stroke-width="1.7" stroke-linecap="round"/></svg>`;
}

function renderTabBar() {
  const ownerScreens = ['home', 'servicios', 'perfil'];
  const host = document.getElementById('tabbar');
  if (!ownerScreens.includes(state.screen)) { host.innerHTML = ''; return; }
  const items = tabDefs.map((t) => {
    const color = state.screen === t.id ? '#1A56C4' : '#94A3B5';
    return `<div data-act="goTab" data-arg="${t.id}" class="tap" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 14px;color:${color};">

  }).join('');
  host.innerHTML = `<div style="flex-shrink:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid #E6EBF2;padding:9px 16px 26px;display:flex;justify-content:space-around;z-index:30;">${items}</div>`;

const escAttr = (v) => String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/"/g, '&quot;');

function field(label, key, ph, mono, optional) {
  const er = state.errors[key];

  return `<div>
    <div style="font-size:13px;font-weight:600;color:#5C6B80;margin-bottom:7px;">${label}${optional ? ' <span style="color:#94A3B5;font-weight:400;">(' + optional + ')</span>' : ''}</div>

    ${er ? `<div style="color:#E5482E;font-size:12px;margin-top:5px;">${er}</div>` : ''}
  </div>`;
}

const HEX = `<svg width="40" height="44" viewBox="0 0 40 44" fill="none"><path d="M20 1.5L37 11.2v19.6L20 40.5 3 30.8V11.2L20 1.5z" fill="#1A56C4"/><path d="M20 13v18M13.5 16.5l13 11M26.5 16.5l-13 11" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`;

function registerOwner() {
  const f = state.form, er = {};
  if (!f.oEmpresa.trim()) er.oEmpresa = 'Ingresa el nombre de la empresa';
  if (!f.oNombre.trim()) er.oNombre = 'Ingresa tu nombre';
  if (!EMAIL_RE.test(f.oEmail)) er.oEmail = 'Email inválido';
  if (f.oFono.replace(/\D/g, '').length < 8) er.oFono = 'Teléfono inválido';
  if (Object.keys(er).length) { state.errors = er; render(); return; }
  save('owner', { empresa: f.oEmpresa, nombre: f.oNombre, email: f.oEmail });
  if (!DEMO) sb.from('clientes').insert({ nombre: f.oEmpresa.trim(), rubro: 'Construcción', equipos: 0, rating: 5.0 }).then(({ error }) => { if (error) console.error(error); });
  state.errors = {}; go('home');
}
function regNext() {
  const f = state.form, step = state.regStep, er = {};
  if (step === 0) {
    if (!f.tNombre.trim()) er.tNombre = 'Ingresa tu nombre';
    if (f.tFono.replace(/\D/g, '').length < 8) er.tFono = 'Teléfono inválido';
    if (!EMAIL_RE.test(f.tEmail)) er.tEmail = 'Email inválido';
  } else if (step === 1) {
    if (f.tSpecs.length === 0) er.tSpecs = 'Selecciona al menos una especialidad';
    if (!f.tCerts.trim()) er.tCerts = 'Indica tus certificaciones';
  }
  if (Object.keys(er).length) { state.errors = er; render(); return; }
  if (step >= 2) { submitTech(); return; }
  state.errors = {}; state.regStep = step + 1; render();
}
function regBack() {
  if (state.regStep <= 0) { state.errors = {}; go('auth'); }
  else { state.regStep -= 1; state.errors = {}; render(); }
}
function submitTech() {
  const f = state.form;
  const tarifa = parseInt(String(f.tTarifa).replace(/\D/g, ''), 10) || 25000;
  const specs = f.tSpecs.length ? f.tSpecs : ['General'];
  const init = initialsOf(f.tNombre || 'TC');
  const color = techAvatars[Math.floor(Math.random() * techAvatars.length)];
  const resetForm = () => { state.form = { ...state.form, tNombre: '', tRut: '', tEmail: '', tFono: '', tCerts: '', tHerr: '', tTarifa: '25000', tSpecs: [] }; };

  if (DEMO) {
    const tech = { id: 't' + Date.now(), name: f.tNombre.trim(), rut: f.tRut.trim() || '—', specs, zona: f.tZona, tarifa, certs: f.tCerts.trim() || '—', herr: f.tHerr.trim(), init, when: 'recién' };
    state.pendingTechs = [tech, ...state.pendingTechs];
    save('pendingTechs', state.pendingTechs);
    resetForm(); state.errors = {}; state.regStep = 0; go('regPending');
    return;
  }
  // live: alta en mecanicos como pendiente de verificación
  resetForm(); state.errors = {}; state.regStep = 0; go('regPending');
  sb.from('mecanicos').insert({
    nombre: f.tNombre.trim(), iniciales: init, color, especialidad: specs.join(' · '),
    especialidades: specs, zona: f.tZona, rating: 5.0, jobs: 0, disponible: false,
    verificado: false, estado: 'pendiente', rut: f.tRut.trim() || null, tarifa,
    certs: f.tCerts.trim() || null, herramientas: f.tHerr.trim() || null,
  }).then(({ error }) => { if (error) console.error(error); loadFaena().then(render); });
}
async function approveTech(id) {
  if (DEMO) {
    const t = state.pendingTechs.find((x) => x.id === id);
    state.pendingTechs = state.pendingTechs.filter((x) => x.id !== id);
    if (t) state.approvedTechs = [...state.approvedTechs, t];
    save('pendingTechs', state.pendingTechs); save('approvedTechs', state.approvedTechs);
    render(); return;
  }
  await sb.from('mecanicos').update({ verificado: true, estado: 'activo' }).eq('id', id);
  await loadFaena(); render();
}
async function rejectTech(id) {
  if (DEMO) {
    state.pendingTechs = state.pendingTechs.filter((x) => x.id !== id);
    save('pendingTechs', state.pendingTechs); render(); return;
  }
  await sb.from('mecanicos').delete().eq('id', id);
  await loadFaena(); render();
}

/* ------------------------------ router ---------------------------------- */
const SCREENS = {
  auth: screenAuth, regOwner: screenRegOwner, regTech: screenRegTech, regPending: screenRegPending, admin: screenAdmin,
  home: screenHome, sos: screenSOS, matching: screenMatching, profile: screenProfile,
  tracking: screenTracking, quote: screenQuote, confirm: screenConfirm,
  servicios: screenServicios, perfil: screenPerfil, mechHome: screenMechHome, mechReq: screenMechReq,
};

const DARK_TOP = ['auth', 'profile', 'mechHome', 'admin'];

function render() {
  const stack = document.getElementById('stack');
  const animate = state.screen !== lastScreen;
  const inner = SCREENS[state.screen]();
  stack.innerHTML = `<div class="${animate ? 'scr' : ''}">${inner}</div>`;
  if (animate) stack.scrollTop = 0;
  renderTabBar();
  const sb = document.getElementById('statusbar');
  if (sb) sb.style.color = DARK_TOP.includes(state.screen) ? '#fff' : '#0F1B2D';
  lastScreen = state.screen;
}

function set(patch) { Object.assign(state, patch); render(); }

function go(screen) {
  clearTimeout(_mt); _mt = null;
  clearInterval(_et); _et = null;
  state.screen = screen;
  render();
}

function updateTracking() {
  const c = document.getElementById('etaClock');
  const b = document.getElementById('trackBar');
  if (!c || !b) return;
  const mm = Math.floor(state.eta / 60), ss = String(state.eta % 60).padStart(2, '0');
  c.textContent = mm + ':' + ss;
  b.style.width = Math.round((1 - state.eta / 480) * 100) + '%';
}

/* ----------------------------- handlers --------------------------------- */
const H = {
  goAuth: () => go('auth'),
  goRegOwner: () => { state.errors = {}; go('regOwner'); },
  goRegTech: () => { state.errors = {}; state.regStep = 0; go('regTech'); },
  goAdmin: () => go('admin'),
  demoLogin: () => go('home'),
  registerOwner: () => registerOwner(),
  regNext: () => regNext(),
  regBack: () => regBack(),
  selSpec: (label) => {
    const has = state.form.tSpecs.includes(label);
    state.form.tSpecs = has ? state.form.tSpecs.filter((x) => x !== label) : [...state.form.tSpecs, label];
    render();
  },
  selZona: (z) => { state.form.tZona = z; render(); },
  adminTab: (id) => { state.adminTab = id; render(); },
  approveTech: (id) => approveTech(id),
  rejectTech: (id) => rejectTech(id),
  goPerfil: () => go('perfil'),
  goSOS: () => go('sos'),
  goHome: () => go('home'),
  goQuote: () => go('quote'),
  backFromSOS: () => go('home'),
  backToMatching: () => go('matching'),
  toMechSide: () => go('mechHome'),
  toOwnerSide: () => go('home'),
  openMechReq: () => go('mechReq'),
  backMechHome: () => go('mechHome'),
  acceptMechReq: () => go('mechHome'),
  goTab: (id) => go(id),
  selFault: (id) => set({ sosFault: id }),
  selSev: (id) => set({ sosSeverity: id }),
  selMech: (i) => { state.selMech = +i; go('profile'); },
  payNow: () => { state.paid = true; go('confirm'); },
  toggleAvail: () => set({ available: !state.available }),
  searchMechanics: () => {
    state.matchDone = false;
    go('matching');
    _mt = setTimeout(() => { state.matchDone = true; render(); }, 2000);
  },
  requestService: () => {
    state.eta = 8 * 60;
    go('tracking');
    _et = setInterval(() => {
      state.eta = Math.max(0, state.eta - 9);
      if (state.eta === 0) { clearInterval(_et); _et = null; render(); }
      else updateTracking();
    }, 1000);
  },
};

document.querySelector('.app').addEventListener('click', (ev) => {
  const el = ev.target.closest('[data-act]');
  if (!el) return;
  const fn = H[el.getAttribute('data-act')];
  if (fn) fn(el.getAttribute('data-arg'));
});

// inputs update state without re-render (preserves focus); params update preview live
document.querySelector('.app').addEventListener('input', (ev) => {
  const el = ev.target;
  if (el.dataset && el.dataset.field) {
    state.form[el.dataset.field] = el.value;
  } else if (el.dataset && el.dataset.param) {
    const n = parseInt(String(el.value).replace(/[^\d]/g, ''), 10);
    const key = el.dataset.param;
    state.params[key] = isNaN(n) ? 0 : n;
    const net = document.getElementById('exNet'), fee = document.getElementById('exFee');
    if (net) net.textContent = clp(Math.round(state.params.tarifaVisita * (1 - state.params.comision / 100)));
    if (fee) fee.textContent = clp(Math.round(state.params.tarifaVisita * state.params.comision / 100));
    if (DEMO) {
      save('params', state.params);
    } else {
      const col = { comision: 'comision', tarifaVisita: 'tarifa_visita', tarifaHora: 'tarifa_hora', radioKm: 'radio_km' }[key];
      sb.from('parametros').update({ [col]: state.params[key], updated_at: new Date().toISOString() }).eq('id', 1).then(({ error }) => { if (error) console.error(error); });
    }
  }
});

/* optional demo entry: ?side=mech starts on the mechanic dashboard */
if (new URLSearchParams(location.search).get('side') === 'mech') state.screen = 'mechHome';

if (!DEMO) { state.pendingTechs = []; state.approvedTechs = []; loadFaena().then(render); }
render();
</script>
</body>
</html>
